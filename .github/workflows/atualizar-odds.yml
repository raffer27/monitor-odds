name: Atualizar odds (4/4h)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Buscar odds e gerar página
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORT_KEY: ${{ vars.SPORT_KEY }}
        run: npm run rodar

      - name: Commitar dados e página atualizados
        run: |
          git config user.name "monitor-odds-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/odds.json docs/index.html
          git diff --quiet --cached || git commit -m "Atualiza odds ($(date -u +'%Y-%m-%dT%H:%MZ'))"
          git push

      - name: Publicar no GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: atualizar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
